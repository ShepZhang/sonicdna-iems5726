services:
  sonicdna:
    build:
      context: ..
      dockerfile: application/Dockerfile
    image: sonicdna:latest
    container_name: sonicdna
    ports:
      - "8501:8501"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
